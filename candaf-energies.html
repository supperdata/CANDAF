<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Candaf Energies – Daily Pump Sales</title>
<style>
  :root {
    --black:  #0D0D0F;
    --dark:   #13141A;
    --panel:  #1A1C24;
    --panel2: #1E2030;
    --border: #2A2D3A;
    --accent: #F5A200;
    --adim:   #7A5200;
    --green:  #22C55E;
    --red:    #EF4444;
    --text:   #E8EAF0;
    --muted:  #7A7E92;
    --r:      10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--dark); border-bottom: 3px solid var(--accent);
    padding: 16px 28px; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-icon {
    width: 48px; height: 48px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .brand-name { font-size: 26px; font-weight: 900; letter-spacing: 3px; color: var(--accent); line-height: 1; text-transform: uppercase; }
  .brand-sub  { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 3px; }
  .meta-badge {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--r);
    padding: 7px 14px; font-size: 12px; color: var(--muted);
  }
  .meta-badge b { color: var(--text); }

  /* MAIN */
  main { max-width: 1300px; margin: 0 auto; padding: 24px 18px 60px; }

  /* SECTION LABEL */
  .sec-label {
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); font-weight: 600; margin-bottom: 8px;
  }

  /* INPUTS */
  input, select {
    background: var(--panel); border: 1px solid var(--border); color: var(--text);
    border-radius: var(--r); padding: 9px 13px;
    font-family: inherit; font-size: 14px; outline: none; transition: border-color .2s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  label.lbl { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-weight: 600; display: block; margin-bottom: 5px; }

  /* CONTROLS TOP */
  .top-controls { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 20px; align-items: flex-end; }
  .cg { display: flex; flex-direction: column; }
  .cg input, .cg select { min-width: 160px; }

  /* PUMP COUNT */
  .pc-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .pc-bar span { font-size: 12px; color: var(--muted); }
  .pc-btn {
    width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel); color: var(--muted); font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all .15s;
  }
  .pc-btn.on, .pc-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

  /* PRICE BAR */
  .price-bar {
    display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end;
    background: var(--panel); border: 1px solid var(--border); border-left: 4px solid var(--accent);
    border-radius: var(--r); padding: 14px 18px; margin-bottom: 24px;
  }
  .price-bar .cg input { min-width: 170px; }

  /* PUMP GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(295px, 1fr)); gap: 14px; margin-bottom: 28px; }

  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: var(--r); overflow: hidden; transition: border-color .2s;
  }
  .card.on-pump { border-color: var(--accent); }
  .card.off-pump { opacity: .45; }

  .card-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--panel2); border-bottom: 1px solid var(--border);
  }
  .pump-id { display: flex; align-items: center; gap: 10px; }
  .pump-num { font-size: 26px; font-weight: 900; color: var(--accent); line-height: 1; width: 28px; }
  .pump-lbl { font-weight: 700; font-size: 14px; }
  .ftag {
    font-size: 10px; padding: 2px 8px; border-radius: 4px;
    font-weight: 700; letter-spacing: .5px; margin-top: 2px; display: inline-block;
  }
  .ft-p { background: #7C3AED22; color: #A78BFA; border: 1px solid #7C3AED55; }
  .ft-d { background: #0EA5E922; color: #38BDF8;  border: 1px solid #0EA5E955; }
  .ft-r { background: #F5A20022; color: #F5A200;  border: 1px solid #7A520055; }

  .tog-wrap { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 11px; color: var(--muted); }
  .tog {
    width: 36px; height: 20px; border-radius: 10px; background: var(--border);
    position: relative; transition: background .2s; flex-shrink: 0;
  }
  .tog::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 14px; height: 14px; border-radius: 50%; background: var(--muted);
    transition: transform .2s, background .2s;
  }
  .tog.on { background: var(--accent); }
  .tog.on::after { transform: translateX(16px); background: #000; }

  .card-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; }
  .field input { width: 100%; font-size: 15px; padding: 9px 11px; font-family: 'Courier New', monospace; }

  .result {
    background: var(--dark); border-radius: 8px; padding: 11px 13px;
    display: flex; justify-content: space-between; align-items: center;
    border: 1px solid var(--border); min-height: 52px;
  }
  .res-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .res-liters { font-family: 'Courier New', monospace; font-size: 13px; color: var(--green); }
  .res-amt    { font-family: 'Courier New', monospace; font-size: 20px; font-weight: 700; color: var(--accent); }
  .res-err    { font-size: 12px; color: var(--red); }
  .res-wait   { font-size: 12px; color: var(--muted); font-style: italic; }

  /* FUEL SELECT */
  .fuel-sel {
    background: transparent; border: none; color: var(--muted);
    font-size: 11px; cursor: pointer; outline: none; padding: 2px 0;
  }

  /* SUMMARY */
  .sumbox { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 24px; }
  .sum-head { background: var(--panel2); padding: 12px 18px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 14px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 9px 14px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
  td { padding: 10px 14px; border-bottom: 1px solid #1E2030; font-family: 'Courier New', monospace; }
  tr:last-child td { border-bottom: none; }
  .td-lbl  { font-family: system-ui, sans-serif; font-weight: 600; }
  .td-l    { color: var(--green); }
  .td-a    { color: var(--accent); }
  .td-off  { color: var(--muted); font-style: italic; font-family: system-ui, sans-serif; }

  /* GRAND TOTAL */
  .grand {
    margin: 0 18px 18px;
    background: linear-gradient(135deg, #1C1400, #271C00);
    border: 1px solid var(--accent); border-radius: var(--r);
    padding: 18px 22px; display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 14px;
  }
  .gt-left  { display: flex; flex-direction: column; gap: 4px; }
  .gt-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--adim); font-weight: 700; }
  .gt-info  { font-size: 13px; color: var(--muted); }
  .gt-l     { font-family: 'Courier New', monospace; font-size: 15px; color: var(--green); margin-top: 2px; }
  .gt-right { display: flex; align-items: baseline; gap: 8px; }
  .gt-cur   { font-size: 20px; font-weight: 900; color: var(--adim); align-self: flex-end; margin-bottom: 5px; }
  .gt-amt   { font-size: 46px; font-weight: 900; color: var(--accent); letter-spacing: -1px; line-height: 1; }

  /* ACTIONS */
  .actions { display: flex; gap: 10px; padding: 0 18px 18px; flex-wrap: wrap; }
  .btn { padding: 10px 18px; border-radius: var(--r); border: none; cursor: pointer; font-family: inherit; font-weight: 700; font-size: 13px; transition: opacity .2s, transform .1s; }
  .btn:active { transform: scale(.97); }
  .btn-p { background: var(--accent); color: #000; }
  .btn-g { background: var(--panel); border: 1px solid var(--border); color: var(--text); }
  .btn:hover { opacity: .82; }

  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    main   { padding: 14px 10px 40px; }
    .grid  { grid-template-columns: 1fr; }
    .gt-amt { font-size: 36px; }
  }
  @media print {
    body { background: #fff; color: #000; }
    header { background: #f0f0f0; border-color: #000; }
    .top-controls, .pc-bar, .price-bar, .actions { display: none !important; }
    .card { background: #fff; border: 1px solid #ccc; break-inside: avoid; }
    .card-head { background: #eee; }
    .result, .grand, .sumbox { border-color: #000; }
    .grand { background: #f9f9f0; }
    table th, table td { color: #000; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">⛽</div>
    <div>
      <div class="brand-name">Candaf Energies</div>
      <div class="brand-sub">Fuel Station · Daily Sales Sheet</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <div class="meta-badge">Date: <b id="hDate">—</b></div>
    <div class="meta-badge">Attendant: <b id="hAtt">—</b></div>
    <div class="meta-badge">Shift: <b id="hShift">—</b></div>
  </div>
</header>

<main>

  <div class="top-controls">
    <div class="cg">
      <label class="lbl">Date</label>
      <input type="date" id="iDate" oninput="syncHeader()" />
    </div>
    <div class="cg">
      <label class="lbl">Attendant Name</label>
      <input type="text" id="iAtt" placeholder="e.g. John Doe" oninput="syncHeader()" style="min-width:180px;" />
    </div>
    <div class="cg">
      <label class="lbl">Shift</label>
      <select id="iShift" onchange="syncHeader()">
        <option>Morning (06:00–14:00)</option>
        <option>Afternoon (14:00–22:00)</option>
        <option>Night (22:00–06:00)</option>
        <option>Full Day</option>
      </select>
    </div>
  </div>

  <div class="sec-label">Number of pumps</div>
  <div class="pc-bar">
    <span>Select:</span>
    <button class="pc-btn" onclick="setPumps(6)">6</button>
    <button class="pc-btn" onclick="setPumps(7)">7</button>
    <button class="pc-btn" onclick="setPumps(8)">8</button>
    <button class="pc-btn" onclick="setPumps(9)">9</button>
    <button class="pc-btn" onclick="setPumps(10)">10</button>
    <button class="pc-btn" onclick="setPumps(12)">12</button>
  </div>

  <div class="price-bar">
    <div class="cg">
      <label class="lbl">Default Price per Litre</label>
      <input type="number" id="defPrice" value="1.75" step="0.01" min="0" oninput="recalcAll()" />
    </div>
    <div class="cg">
      <label class="lbl">Currency</label>
      <input type="text" id="iCur" value="GHS" maxlength="5" style="min-width:80px;max-width:90px;text-transform:uppercase;" oninput="recalcAll()" />
    </div>
    <div class="cg" style="justify-content:flex-end;">
      <label class="lbl" style="opacity:0">x</label>
      <div style="font-size:12px;color:var(--muted);padding:9px 0;">
        💡 Leave pump price blank to use default
      </div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="sumbox">
    <div class="sum-head">📋 Daily Summary</div>
    <table>
      <thead>
        <tr>
          <th>Pump</th><th>Fuel</th><th>Opening (L)</th>
          <th>Closing (L)</th><th>Sold (L)</th><th>Price/L</th><th id="thAmt">Sales (GHS)</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

    <div class="grand">
      <div class="gt-left">
        <div class="gt-title">Grand Total — All Active Pumps</div>
        <div class="gt-info" id="gtInfo">0 pumps active</div>
        <div class="gt-l"   id="gtL">0.00 L sold</div>
      </div>
      <div class="gt-right">
        <div class="gt-cur" id="gtCur">GHS</div>
        <div class="gt-amt" id="gtAmt">0.00</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-p" onclick="window.print()">🖨️ Print / Save PDF</button>
      <button class="btn btn-g" onclick="doReset()">🔄 Reset Readings</button>
      <button class="btn btn-g" onclick="doCSV()">📥 Export CSV</button>
    </div>
  </div>

</main>

<script>
  // ─── STATE ───────────────────────────────────
  var N = 8;
  var FUELS = ['Petrol','Diesel','Premium'];
  var FTAG  = {Petrol:'ft-p', Diesel:'ft-d', Premium:'ft-r'};
  var pumps = [];

  // ─── BOOT ────────────────────────────────────
  (function(){
    var today = new Date();
    var y = today.getFullYear();
    var m = String(today.getMonth()+1).padStart(2,'0');
    var d = String(today.getDate()).padStart(2,'0');
    document.getElementById('iDate').value = y+'-'+m+'-'+d;
    syncHeader();
    setPumps(8);
  })();

  function syncHeader(){
    var d = document.getElementById('iDate').value;
    var a = document.getElementById('iAtt').value || '—';
    var s = document.getElementById('iShift').value;
    document.getElementById('hDate').textContent  = d || '—';
    document.getElementById('hAtt').textContent   = a;
    document.getElementById('hShift').textContent = s;
  }

  // ─── PUMP COUNT ──────────────────────────────
  function setPumps(n){
    N = n;
    document.querySelectorAll('.pc-btn').forEach(function(b){
      b.classList.toggle('on', parseInt(b.textContent) === n);
    });
    // grow array
    while(pumps.length < n){
      var i = pumps.length;
      pumps.push({ active:true, fuel:FUELS[i % FUELS.length], open:'', close:'', price:'' });
    }
    pumps = pumps.slice(0, n);
    renderGrid();
  }

  // ─── RENDER GRID ─────────────────────────────
  function renderGrid(){
    var g = document.getElementById('grid');
    g.innerHTML = '';
    for(var i=0;i<N;i++){ g.innerHTML += cardHTML(i); }
    recalcAll();
  }

  function cardHTML(i){
    var p = pumps[i];
    var fOpts = FUELS.map(function(f){
      return '<option value="'+f+'"'+(f===p.fuel?' selected':'')+'>'+f+'</option>';
    }).join('');
    return '<div class="card '+(p.active?'on-pump':'off-pump')+'" id="c'+i+'">'
      +'<div class="card-head">'
        +'<div class="pump-id">'
          +'<div class="pump-num">'+(i+1)+'</div>'
          +'<div>'
            +'<div class="pump-lbl">Pump '+(i+1)+'</div>'
            +'<span class="ftag '+FTAG[p.fuel]+'">'+p.fuel+'</span>'
          +'</div>'
        +'</div>'
        +'<div style="display:flex;align-items:center;gap:10px;">'
          +'<select class="fuel-sel" onchange="setFuel('+i+',this.value)">'+fOpts+'</select>'
          +'<label class="tog-wrap" onclick="togPump('+i+')">'
            +'<div class="tog'+(p.active?' on':'')+'"></div>'
            +'<span>'+(p.active?'ON':'OFF')+'</span>'
          +'</label>'
        +'</div>'
      +'</div>'
      +'<div class="card-body">'
        +'<div class="row2">'
          +'<div class="field"><label class="lbl">Opening Meter Reading (L)</label>'
            +'<input type="number" id="o'+i+'" value="'+p.open+'" min="0" step="0.01" placeholder="e.g. 12500" oninput="onVal('+i+')" '+(p.active?'':'disabled')+'></div>'
          +'<div class="field"><label class="lbl">Closing Meter Reading (L)</label>'
            +'<input type="number" id="k'+i+'" value="'+p.close+'" min="0" step="0.01" placeholder="e.g. 15300" oninput="onVal('+i+')" '+(p.active?'':'disabled')+'></div>'
        +'</div>'
        +'<div class="field"><label class="lbl">Price / Litre (blank = default)</label>'
          +'<input type="number" id="pr'+i+'" value="'+p.price+'" min="0" step="0.01" placeholder="Default" oninput="onVal('+i+')" '+(p.active?'':'disabled')+'></div>'
        +'<div class="result" id="r'+i+'"><span class="res-wait">Enter readings above</span></div>'
      +'</div>'
    +'</div>';
  }

  // ─── PUMP EVENTS ─────────────────────────────
  function togPump(i){
    pumps[i].active = !pumps[i].active;
    var card = document.getElementById('c'+i);
    card.className = 'card '+(pumps[i].active?'on-pump':'off-pump');
    var tog = card.querySelector('.tog');
    tog.className = 'tog'+(pumps[i].active?' on':'');
    card.querySelector('.tog-wrap span').textContent = pumps[i].active?'ON':'OFF';
    var inps = card.querySelectorAll('input');
    inps.forEach(function(el){ el.disabled = !pumps[i].active; });
    calcPump(i);
    updateSummary();
  }

  function setFuel(i, f){
    pumps[i].fuel = f;
    var card = document.getElementById('c'+i);
    var ftag = card.querySelector('.ftag');
    ftag.textContent = f;
    ftag.className = 'ftag '+FTAG[f];
  }

  function onVal(i){
    pumps[i].open  = document.getElementById('o'+i).value;
    pumps[i].close = document.getElementById('k'+i).value;
    pumps[i].price = document.getElementById('pr'+i).value;
    calcPump(i);
    updateSummary();
  }

  // ─── CALCULATE ONE PUMP ──────────────────────
  function calcPump(i){
    var p   = pumps[i];
    var def = parseFloat(document.getElementById('defPrice').value) || 0;
    var cur = (document.getElementById('iCur').value || 'GHS').toUpperCase();
    var el  = document.getElementById('r'+i);
    if(!p.active){
      el.innerHTML = '<span class="res-wait">Pump inactive</span>';
      return { liters:NaN, amount:NaN };
    }
    var ov = parseFloat(p.open);
    var cv = parseFloat(p.close);
    var pv = parseFloat(p.price) || def;
    if(isNaN(ov) || isNaN(cv)){
      el.innerHTML = '<span class="res-wait">Enter readings above</span>';
      return { liters:NaN, amount:NaN };
    }
    var L = cv - ov;
    if(L < 0){
      el.innerHTML = '<span class="res-err">⚠ Closing &lt; Opening — check meter readings</span>';
      return { liters:NaN, amount:NaN };
    }
    var A = (pv > 0) ? L * pv : NaN;
    el.innerHTML =
      '<div><div class="res-lbl">Litres Sold</div><div class="res-liters">'+fmt(L)+' L</div></div>'
      +'<div style="text-align:right"><div class="res-lbl">Sales ('+cur+')</div>'
      +'<div class="res-amt">'+(isNaN(A)?'—':fmtM(A))+'</div></div>';
    return { liters:L, amount:A };
  }

  // ─── RECALC ALL ──────────────────────────────
  function recalcAll(){
    var cur = (document.getElementById('iCur').value || 'GHS').toUpperCase();
    document.getElementById('thAmt').textContent = 'Sales ('+cur+')';
    for(var i=0;i<N;i++) calcPump(i);
    updateSummary();
  }

  // ─── SUMMARY ─────────────────────────────────
  function updateSummary(){
    var def = parseFloat(document.getElementById('defPrice').value) || 0;
    var cur = (document.getElementById('iCur').value || 'GHS').toUpperCase();
    var rows = '', totalL = 0, totalA = 0, active = 0;

    for(var i=0;i<N;i++){
      var p  = pumps[i];
      if(!p.active){
        rows += '<tr>'
          +'<td class="td-lbl">Pump '+(i+1)+'</td>'
          +'<td class="td-off">—</td>'
          +'<td class="td-off" colspan="5">Inactive</td>'
          +'</tr>';
        continue;
      }
      var ov = parseFloat(p.open);
      var cv = parseFloat(p.close);
      var pv = parseFloat(p.price) || def;
      var L  = (!isNaN(ov)&&!isNaN(cv)) ? (cv-ov) : NaN;
      var A  = (!isNaN(L)&&L>=0&&pv>0)  ? L*pv    : NaN;
      var bad = (!isNaN(L)&&L<0);
      if(!isNaN(L)&&L>=0&&!isNaN(A)){ totalL+=L; totalA+=A; active++; }

      rows += '<tr>'
        +'<td class="td-lbl">Pump '+(i+1)+'</td>'
        +'<td><span class="ftag '+FTAG[p.fuel]+'">'+p.fuel+'</span></td>'
        +'<td>'+(isNaN(ov)?'—':fmt(ov))+'</td>'
        +'<td>'+(isNaN(cv)?'—':fmt(cv))+'</td>'
        +'<td class="td-l">'+(bad?'<span style="color:var(--red)">Error</span>':isNaN(L)?'—':fmt(L)+' L')+'</td>'
        +'<td>'+pv.toFixed(2)+'</td>'
        +'<td class="td-a">'+(bad||isNaN(A)?'—':fmtM(A))+'</td>'
        +'</tr>';
    }

    document.getElementById('tbody').innerHTML = rows;
    document.getElementById('gtInfo').textContent = active+' pump'+(active!==1?'s':'')+' active';
    document.getElementById('gtL').textContent    = fmt(totalL)+' L sold';
    document.getElementById('gtAmt').textContent  = fmtM(totalA);
    document.getElementById('gtCur').textContent  = cur;
    document.getElementById('thAmt').textContent  = 'Sales ('+cur+')';
  }

  // ─── RESET ───────────────────────────────────
  function doReset(){
    if(!confirm('Clear all pump readings? This cannot be undone.')) return;
    pumps = pumps.map(function(p){ return Object.assign({},p,{open:'',close:'',price:''}); });
    renderGrid();
  }

  // ─── EXPORT CSV ──────────────────────────────
  function doCSV(){
    var def = parseFloat(document.getElementById('defPrice').value) || 0;
    var cur = (document.getElementById('iCur').value||'GHS').toUpperCase();
    var date= document.getElementById('iDate').value;
    var att = document.getElementById('iAtt').value||'N/A';
    var sh  = document.getElementById('iShift').value;
    var c   = 'Candaf Energies - Daily Sales Report\n';
    c += 'Date,'+date+'\nAttendant,'+att+'\nShift,'+sh+'\n\n';
    c += 'Pump,Fuel Type,Opening (L),Closing (L),Litres Sold,Price/L ('+cur+'),Sales ('+cur+')\n';
    var tL=0, tA=0;
    pumps.forEach(function(p,i){
      if(!p.active){ c+='Pump '+(i+1)+',INACTIVE,,,,,\n'; return; }
      var ov=parseFloat(p.open), cv=parseFloat(p.close), pv=parseFloat(p.price)||def;
      var L=(!isNaN(ov)&&!isNaN(cv))?(cv-ov):NaN;
      var A=(!isNaN(L)&&L>=0&&pv>0)?L*pv:NaN;
      if(!isNaN(L)&&L>=0&&!isNaN(A)){tL+=L;tA+=A;}
      c+='Pump '+(i+1)+','+p.fuel+','+(isNaN(ov)?'':ov)+','+(isNaN(cv)?'':cv)+','
        +(isNaN(L)?'':L.toFixed(2))+','+pv.toFixed(2)+','+(isNaN(A)?'':A.toFixed(2))+'\n';
    });
    c+='\nGRAND TOTAL,,,,' +tL.toFixed(2)+' L,,'+tA.toFixed(2)+'\n';
    var b=new Blob([c],{type:'text/csv'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download='Candaf_Sales_'+date+'.csv';
    a.click();
  }

  // ─── FORMAT HELPERS ──────────────────────────
  function fmt(n){ return isNaN(n)?'—':parseFloat(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function fmtM(n){ return isNaN(n)?'—':parseFloat(n).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }
</script>
